version: "3.8"

services:
  evo_gateway:
    image: ghcr.io/patrickrrsilveira-create/evo-crm-vysor-evo-crm-gateway:latest
    networks:
      - minha_rede
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.swarm.network=minha_rede
        - traefik.http.routers.evo_gateway.rule=Host(`api-crm.vysortech.app.br`)
        - traefik.http.routers.evo_gateway.entrypoints=websecure
        - traefik.http.routers.evo_gateway.tls.certresolver=letsencryptresolver
        - traefik.http.routers.evo_gateway.service=evo_gateway
        - traefik.http.services.evo_gateway.loadbalancer.server.port=3030
        - traefik.http.services.evo_gateway.loadbalancer.passHostHeader=true

  evo_auth:
    image: ghcr.io/patrickrrsilveira-create/evo-crm-vysor-evo-auth-service-community:latest
    command: bash -c "bundle exec rails db:migrate 2>&1 || echo 'Migration had errors, continuing...'; bundle exec rails s -p 3001 -b 0.0.0.0"
    environment:
      RAILS_ENV: production
      RAILS_MAX_THREADS: 5
      SECRET_KEY_BASE: xsPT52m0647Je3uE1QO0yTOx5quGhBrf
      JWT_SECRET_KEY: LAQnYLNFjCeekP7glOwhnYtUVZkQ0IXJ
      EVOAI_CRM_API_TOKEN: 3cUU99Bc0eTetF2pEvUu7QuQZzdspBcf
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: e2zaFkFxxIfX04QxP55LEvX2ZNW6XKFb
      POSTGRES_DATABASE: evo_community
      POSTGRES_SSLMODE: disable
      REDIS_URL: redis://:e2zaFkFxxIfX04QxP55LEvX2ZNW6XKFb@redis:6379/4
      FRONTEND_URL: https://crm.vysortech.app.br
      BACKEND_URL: https://api-crm.vysortech.app.br
      CORS_ORIGINS: https://crm.vysortech.app.br,https://api-crm.vysortech.app.br
      DOORKEEPER_JWT_SECRET_KEY: OCMxvSBvISbjGju6hR0BVJDAEevy2631
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      MFA_ISSUER: EvoCRM
      SIDEKIQ_CONCURRENCY: 10
    networks:
