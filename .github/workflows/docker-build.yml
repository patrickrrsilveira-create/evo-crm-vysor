name: Build and Publish Docker Images

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Use a script to lowercase the repository name later in the job, so we avoid uppercase errors in docker tags
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: evo-ai-crm-community
            context: ./evo-ai-crm-community
            dockerfile: ./evo-ai-crm-community/docker/Dockerfile
            image: evo-ai-crm-community
          - name: evo-auth-service-community
            context: ./evo-auth-service-community
            dockerfile: ./evo-auth-service-community/Dockerfile
            image: evo-auth-service-community
          - name: evo-ai-core-service-community
            context: ./evo-ai-core-service-community
            dockerfile: ./evo-ai-core-service-community/Dockerfile
            image: evo-ai-core-service-community
          - name: evo-ai-processor-community
            context: ./evo-ai-processor-community
            dockerfile: ./evo-ai-processor-community/Dockerfile
            image: evo-ai-processor-community
          - name: evo-bot-runtime
            context: ./evo-bot-runtime
            dockerfile: ./evo-bot-runtime/Dockerfile
            image: evo-bot-runtime
          - name: evo-ai-frontend-community
            context: ./evo-ai-frontend-community
            dockerfile: ./evo-ai-frontend-community/Dockerfile
            image: evo-ai-frontend-community

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vysortech10-boop/evo-crm-vysor-${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
